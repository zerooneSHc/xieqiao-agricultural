<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斜桥农产品供销系统 | 销售数据分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .chart-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .chart-card:hover { transform: translateY(-4px); }
        .stat-card {
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.15);
        }
        .chart-wrapper {
            width: 100%;
            overflow-x: auto;
        }
        #salesChart {
            min-width: 800px;
            height: 450px;
        }
        @media (max-width: 768px) {
            #salesChart { min-width: 600px; height: 380px; }
        }
    </style>
</head>
<body class="font-sans text-gray-800">

<!-- 简易导航 -->
<header class="sticky top-0 z-50 bg-white shadow-sm">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-leaf text-primary text-2xl" style="color:#2E7D32"></i>
            <h1 class="text-xl font-bold text-primary">斜桥农产品供销系统</h1>
        </div>
        <nav class="hidden md:flex gap-6">
            <a href="index.html" class="text-gray-600 hover:text-primary transition">首页</a>
            <a href="#" class="text-primary font-medium border-b-2 border-primary">销售分析</a>
        </nav>
        <a href="login.html" class="hidden md:block px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90">登录</a>
    </div>
</header>

<main class="container mx-auto px-4 py-12">
    <div class="text-center mb-10">
        <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mb-3">全品类农产品销售数据看板</h2>
        <p class="text-gray-500 max-w-2xl mx-auto">涵盖生鲜、农副产品、加工农产品，数据实时同步自数据库</p>
    </div>

    <!-- 三组统计卡片（总销售额、最高销售额TOP4、最低销售额TOP4） -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8" id="statsCards">
        <!-- 总销售额卡片 -->
        <div class="stat-card bg-gradient-to-br from-green-50 to-emerald-100 rounded-2xl p-6 shadow-md border border-green-100">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-gray-600 font-semibold">本月总销售额</h3>
                <i class="fa-solid fa-chart-pie text-2xl text-primary opacity-70"></i>
            </div>
            <div class="text-4xl font-bold text-primary" id="totalSales">-- 万元</div>
            <p class="text-gray-500 text-sm mt-2">统计周期：近30天</p>
        </div>
        <!-- 最高销售额 TOP4 卡片 -->
        <div class="stat-card bg-gradient-to-br from-amber-50 to-orange-100 rounded-2xl p-6 shadow-md border border-amber-100">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-gray-600 font-semibold">🏆 销售额最高 TOP4</h3>
                <i class="fa-solid fa-arrow-up text-green-600"></i>
            </div>
            <ul id="topProducts" class="space-y-2 text-sm">
                <li class="text-gray-400">加载中...</li>
            </ul>
        </div>
        <!-- 最低销售额 TOP4 卡片 -->
        <div class="stat-card bg-gradient-to-br from-blue-50 to-indigo-100 rounded-2xl p-6 shadow-md border border-blue-100">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-gray-600 font-semibold">⚠️ 销售额最低 TOP4</h3>
                <i class="fa-solid fa-arrow-down text-red-500"></i>
            </div>
            <ul id="bottomProducts" class="space-y-2 text-sm">
                <li class="text-gray-400">加载中...</li>
            </ul>
        </div>
    </div>

    <!-- 图表卡片 -->
    <div class="chart-card p-6 md:p-8">
        <div class="flex flex-wrap justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-chart-line text-primary text-xl"></i>
                <span class="font-semibold text-gray-700">各商品销售额明细（万元）</span>
            </div>
            <div class="text-sm text-gray-400 bg-gray-100 px-3 py-1 rounded-full">支持横向滚动</div>
        </div>
        <div class="chart-wrapper">
            <div id="salesChart"></div>
        </div>
        <p class="text-center text-xs text-gray-400 mt-6">* 图表支持横向滚动，商品过多时可左右滑动查看 | 数据动态对接后端</p>
    </div>

    <div class="mt-8 text-center text-gray-500 text-sm">
        <i class="fa-regular fa-lightbulb"></i> 提示：销售额最高/最低商品自动从数据库所有农产品中统计生成。
    </div>
</main>

<footer class="bg-gray-800 text-white py-6 mt-12">
    <div class="container mx-auto px-4 text-center text-gray-400 text-sm">
        © 2026 斜桥农产品供销系统 | 数据可视化 · 智慧助农
    </div>
</footer>

<script>
    // 后端API地址（请根据实际环境修改）
    const API_URL = '/api/sales/all-products';

    // 模拟数据：包含所有品类（生鲜、农副产品、加工农产品）
    const mockData = {
        products: [
            "桃子", "梨子", "葡萄", "西瓜", "草莓", "玉米", "芋头", "茄子", "豇豆",
            "大米", "籼子", "生姜片", "包子", "脆饼", "乌骨鸡", "草鸡蛋", "鹅蛋",
            "肉脯", "干豇豆", "草莓酱", "糖山楂", "芋头面条"
        ],
        sales: [
            42.5, 38.2, 55.8, 67.3, 89.1, 28.6, 33.4, 22.7, 19.5,
            112.3, 45.6, 27.8, 35.2, 29.9, 72.4, 68.5, 41.2,
            93.6, 24.3, 57.8, 48.1, 36.7
        ]
    };

    // 从后端加载销售数据
    async function loadSalesData() {
        try {
            const response = await fetch(API_URL, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
            });
            if (response.ok) {
                const data = await response.json();
                if (data.products && Array.isArray(data.products) && data.sales && Array.isArray(data.sales) && data.products.length === data.sales.length) {
                    return data;
                } else {
                    console.warn('后端返回数据格式错误，使用模拟数据');
                    return mockData;
                }
            } else {
                console.warn('后端接口响应异常，使用模拟数据');
                return mockData;
            }
        } catch (error) {
            console.error('请求销售数据失败:', error);
            return mockData;
        }
    }

    // 更新统计卡片（总销售额、TOP4、BOTTOM4）
    function updateStatsCards(products, sales) {
        // 计算总销售额（万元）
        const total = sales.reduce((sum, val) => sum + val, 0);
        document.getElementById('totalSales').innerHTML = `${total.toFixed(1)} 万元`;

        // 构建商品-销售额数组，并按销售额排序
        const items = products.map((name, idx) => ({ name, sales: sales[idx] }));
        items.sort((a, b) => b.sales - a.sales);

        // 最高4个（如果商品总数少于4则全部显示）
        const top4 = items.slice(0, 4);
        const topList = document.getElementById('topProducts');
        topList.innerHTML = '';
        top4.forEach(item => {
            const li = document.createElement('li');
            li.className = 'flex justify-between items-center border-b border-amber-200 pb-1';
            li.innerHTML = `<span class="font-medium text-gray-700">${item.name}</span><span class="text-primary font-bold">${item.sales.toFixed(1)} 万</span>`;
            topList.appendChild(li);
        });
        if (top4.length === 0) topList.innerHTML = '<li class="text-gray-400">暂无数据</li>';

        // 最低4个（排除0销售额？保留所有，取最后4个）
        const bottom4 = items.slice(-4).reverse(); // 倒序让最低的排在前面
        const bottomList = document.getElementById('bottomProducts');
        bottomList.innerHTML = '';
        bottom4.forEach(item => {
            const li = document.createElement('li');
            li.className = 'flex justify-between items-center border-b border-blue-200 pb-1';
            li.innerHTML = `<span class="font-medium text-gray-700">${item.name}</span><span class="text-red-500 font-bold">${item.sales.toFixed(1)} 万</span>`;
            bottomList.appendChild(li);
        });
        if (bottom4.length === 0) bottomList.innerHTML = '<li class="text-gray-400">暂无数据</li>';
    }

    // 渲染 ECharts 图表（支持横向滚动，适应较多商品）
    async function renderChart() {
        const chartDom = document.getElementById('salesChart');
        const myChart = echarts.init(chartDom);

        myChart.showLoading({ text: '正在加载销售数据...', color: '#2E7D32' });

        const data = await loadSalesData();
        myChart.hideLoading();

        // 更新卡片数据
        updateStatsCards(data.products, data.sales);

        const productCount = data.products.length;
        let axisLabelRotate = 0;
        let axisLabelInterval = 0;
        if (productCount > 12) axisLabelRotate = 35;
        if (productCount > 18) axisLabelInterval = 1;

        const option = {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: function(params) {
                    return `${params[0].axisValue}<br/>销售额: ${params[0].value} 万元`;
                },
                backgroundColor: 'rgba(255,255,255,0.96)',
                borderColor: '#2E7D32',
                borderWidth: 1
            },
            grid: {
                left: '8%',
                right: '5%',
                bottom: productCount > 12 ? '12%' : '8%',
                top: '10%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: data.products,
                axisLabel: {
                    fontSize: 11,
                    fontWeight: '500',
                    rotate: axisLabelRotate,
                    interval: axisLabelInterval,
                    margin: 12,
                    color: '#374151'
                },
                axisLine: { lineStyle: { color: '#CBD5E1' } }
            },
            yAxis: {
                type: 'value',
                name: '销售额 (万元)',
                nameTextStyle: { fontSize: 13, fontWeight: '500', color: '#4B5563' },
                splitLine: { lineStyle: { type: 'dashed', color: '#E2E8F0' } },
                axisLabel: { fontSize: 11 }
            },
            series: [{
                name: '销售额',
                type: 'bar',
                data: data.sales,
                itemStyle: {
                    borderRadius: [6, 6, 0, 0],
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: '#4CAF50' },
                            { offset: 1, color: '#2E7D32' }
                        ]
                    },
                    shadowColor: 'rgba(46,125,50,0.25)',
                    shadowBlur: 10
                },
                label: {
                    show: productCount <= 15,
                    position: 'top',
                    fontWeight: 'bold',
                    color: '#2E7D32',
                    fontSize: 11,
                    formatter: '{c}'
                },
                barWidth: productCount > 20 ? '60%' : '55%',
                emphasis: { focus: 'series' }
            }],
            backgroundColor: 'transparent',
            dataZoom: productCount > 15 ? [
                {
                    type: 'slider',
                    start: 0,
                    end: 60,
                    bottom: 10,
                    handleSize: '80%'
                }
            ] : []
        };

        myChart.setOption(option);
        window.addEventListener('resize', () => myChart.resize());
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderChart);
    } else {
        renderChart();
    }
</script>
</body>
</html>
